openapi: 3.0.3
info:
  title: JSONPlaceholder API
  version: 1.0.0
  description: Спецификация для тестирования типичных CRUD операций

servers:
  - url: https://jsonplaceholder.typicode.com

paths:
  /posts:
    get:
      summary: Список всех постов
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      summary: Создать новый пост
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Post"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Получить пост по ID
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object

    put:
      summary: Полное обновление поста (замена)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Post"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    patch:
      summary: Частичное обновление поста
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Patched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    delete:
      summary: Удалить пост
      responses:
        "200":
          description: Successfully deleted
          content:
            application/json:
              schema:
                type: object

components:
  schemas:

    Post:
      type: object
      required:
        - title
        - body
        - userId
      properties:
        id:
          type: integer
          nullable: true
          example: 1
        userId:
          type: integer
          example: 1
        title:
          type: string
          example: "test title"
        body:
          type: string
          example: "test body"

    PostUpdate:
      type: object
      properties:
        userId:
          type: integer
        title:
          type: string
        body:
          type: string